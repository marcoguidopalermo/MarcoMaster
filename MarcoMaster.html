<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MarcoMaster</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0c0d0e;
  --panel:#141618;
  --panel-2:#1b1e21;
  --line:#2a2e33;
  --line-soft:#21252a;
  --txt:#e8e6e1;
  --txt-dim:#9aa0a6;
  --txt-faint:#5e646b;
  --accent:#ff5c2b;
  --accent-soft:#ff5c2b22;
  --green:#3fb950;
  --amber:#e3b341;
  --red:#f85149;
  --blue:#58a6ff;
  --glow1:#15171a;
  --glow2:#121417;
  --radius:10px;
  --mono:'JetBrains Mono',monospace;
  --sans:'Archivo',sans-serif;
  --serif:'Newsreader',serif;
}
[data-theme="light"]{
  --bg:#f6f4ef;
  --panel:#ffffff;
  --panel-2:#efece5;
  --line:#dcd7cc;
  --line-soft:#e8e4da;
  --txt:#1c1d1f;
  --txt-dim:#5d6168;
  --txt-faint:#9a968c;
  --accent:#e8481b;
  --accent-soft:#e8481b18;
  --green:#1a8a36;
  --amber:#a87a08;
  --red:#d12f2f;
  --blue:#1f6feb;
  --glow1:#ece8df;
  --glow2:#f0ede4;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:
    radial-gradient(900px 600px at 85% -10%, var(--glow1) 0%, transparent 60%),
    radial-gradient(700px 500px at 0% 110%, var(--glow2) 0%, transparent 55%),
    var(--bg);
  color:var(--txt);
  font-family:var(--sans);
  font-size:15px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:6px;border:2px solid var(--bg)}
::-webkit-scrollbar-thumb:hover{background:var(--txt-faint)}

.app{display:flex;min-height:100vh}

/* SIDEBAR */
.sidebar{
  width:236px;flex-shrink:0;
  border-right:1px solid var(--line);
  background:linear-gradient(180deg,#0e1012,#0b0c0d);
  padding:22px 14px;
  position:sticky;top:0;height:100vh;
  display:flex;flex-direction:column;gap:4px;
  overflow-y:auto;
}
.brand{padding:4px 10px 18px;border-bottom:1px solid var(--line-soft);margin-bottom:12px}
.brand h1{
  font-size:20px;font-weight:900;letter-spacing:-0.02em;
  display:flex;align-items:center;gap:8px;
}
.brand .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent)}
.brand .tag{font-family:var(--mono);font-size:9.5px;color:var(--txt-faint);letter-spacing:0.14em;text-transform:uppercase;margin-top:7px;line-height:1.6}
.brand .tag b{color:var(--txt-dim);font-weight:600}

.navbtn{
  display:flex;align-items:center;gap:11px;
  padding:9px 11px;border-radius:8px;cursor:pointer;
  color:var(--txt-dim);font-weight:500;font-size:13.5px;
  border:1px solid transparent;transition:all .14s;
  text-align:left;width:100%;background:none;font-family:var(--sans);
}
.navbtn:hover{background:var(--panel);color:var(--txt)}
.navbtn.active{background:var(--accent-soft);color:var(--accent);border-color:#ff5c2b33}
.navbtn .ic{width:17px;text-align:center;font-size:14px;flex-shrink:0}
.navbtn .badge{margin-left:auto;font-family:var(--mono);font-size:10px;background:var(--accent);color:#fff;border-radius:20px;padding:1px 7px;font-weight:700}
.navbtn.active .badge{background:var(--accent)}

.side-foot{margin-top:auto;padding-top:14px;border-top:1px solid var(--line-soft)}
.reset-btn{
  width:100%;background:none;border:1px solid var(--line);
  color:var(--txt-dim);padding:10px;border-radius:8px;cursor:pointer;
  font-family:var(--mono);font-size:11px;letter-spacing:0.1em;text-transform:uppercase;
  transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px;
}
.reset-btn:hover{border-color:var(--accent);color:var(--accent)}

/* MAIN */
.main{flex:1;min-width:0;padding:34px 44px 80px;max-width:1080px}
.page{display:none;animation:fade .3s ease}
.page.show{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.phead{margin-bottom:26px}
.phead .kicker{font-family:var(--mono);font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--accent);font-weight:600}
.phead h2{font-size:30px;font-weight:800;letter-spacing:-0.025em;margin-top:5px}
.phead p{color:var(--txt-dim);margin-top:7px;max-width:640px;font-size:14px}
.phead .serif{font-family:var(--serif);font-style:italic;font-size:17px;color:var(--txt);margin-top:10px}

/* CARDS */
.card{
  background:var(--panel);border:1px solid var(--line);
  border-radius:var(--radius);padding:20px 22px;margin-bottom:18px;
}
.card.flush{padding:0;overflow:hidden}
.card-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px}
.card-h h3{font-size:13px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--txt)}
.card-h .sub{font-family:var(--mono);font-size:11px;color:var(--txt-faint)}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px}
@media(max-width:880px){.grid2,.grid3{grid-template-columns:1fr}}

/* CHECK ROWS */
.check{
  display:flex;align-items:flex-start;gap:12px;padding:11px 12px;
  border-radius:8px;cursor:pointer;transition:background .12s;
  border:1px solid transparent;
}
.check:hover{background:var(--panel-2)}
.check .box{
  width:20px;height:20px;border-radius:6px;border:1.5px solid var(--line);
  flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;
  transition:all .15s;font-size:12px;color:transparent;font-weight:700;
}
.check.done .box{background:var(--accent);border-color:var(--accent);color:#fff}
.check.done .lbl{color:var(--txt-faint);text-decoration:line-through;text-decoration-color:var(--txt-faint)}
.check .lbl{font-size:14px;line-height:1.45;flex:1}
.check .lbl small{display:block;color:var(--txt-faint);font-size:11.5px;margin-top:2px;font-family:var(--mono)}

/* INPUTS */
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--txt-dim);margin-bottom:6px}
.field label .hint{color:var(--txt-faint);font-weight:400;text-transform:none;letter-spacing:0;font-family:var(--mono);font-size:10.5px}
input[type=text],textarea,select{
  width:100%;background:var(--bg);border:1px solid var(--line);
  color:var(--txt);padding:10px 12px;border-radius:8px;
  font-family:var(--sans);font-size:14px;resize:vertical;transition:border .15s;
}
input[type=text]:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent)}
input::placeholder,textarea::placeholder{color:var(--txt-faint)}
textarea{min-height:70px;line-height:1.55}

.focusrow{display:flex;align-items:center;gap:12px;margin-bottom:11px}
.focusrow .tag{
  font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:0.06em;
  width:88px;flex-shrink:0;text-transform:uppercase;padding:4px 0;
}
.focusrow .tag.biz{color:var(--blue)}
.focusrow .tag.health{color:var(--green)}
.focusrow .tag.lev{color:var(--amber)}
.focusrow .tag.content{color:var(--accent)}
.focusrow .tag.not{color:var(--red)}
.focusrow input{flex:1}

/* PILL BUTTONS */
.btn{
  background:var(--accent);color:#fff;border:none;padding:10px 18px;
  border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;
  font-family:var(--sans);transition:all .15s;letter-spacing:0.01em;
}
.btn:hover{background:#ff6f44;transform:translateY(-1px)}
.btn:active{transform:none}
.btn.ghost{background:none;border:1px solid var(--line);color:var(--txt-dim)}
.btn.ghost:hover{border-color:var(--accent);color:var(--accent);background:none}
.btn.sm{padding:6px 12px;font-size:12px}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px}

/* SAVE TOAST */
.toast{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--green);color:#06210b;padding:11px 22px;border-radius:30px;
  font-weight:700;font-size:13px;opacity:0;pointer-events:none;transition:all .3s;
  font-family:var(--mono);letter-spacing:0.04em;z-index:200;box-shadow:0 8px 30px #0008;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* SCORECARD */
.score-row{display:flex;align-items:center;gap:16px;padding:9px 0;border-bottom:1px solid var(--line-soft)}
.score-row:last-child{border:none}
.score-row .name{width:150px;flex-shrink:0;font-weight:500;font-size:14px}
.score-row .slider{flex:1;display:flex;align-items:center;gap:14px}
.score-row input[type=range]{flex:1;-webkit-appearance:none;height:5px;border-radius:4px;background:var(--line);outline:none}
.score-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 0 0 4px var(--accent-soft)}
.score-row input[type=range]::-moz-range-thumb{width:18px;height:18px;border:none;border-radius:50%;background:var(--accent);cursor:pointer}
.score-row .val{font-family:var(--mono);font-weight:700;width:42px;text-align:right;font-size:15px}
.score-row .val.low{color:var(--red)}.score-row .val.mid{color:var(--amber)}.score-row .val.high{color:var(--green)}

.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:6px}
.sumbox{background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:14px}
.sumbox .lab{font-family:var(--mono);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--txt-faint)}
.sumbox .v{font-size:18px;font-weight:700;margin-top:5px}
.sumbox .v.g{color:var(--green)}.sumbox .v.r{color:var(--red)}.sumbox .v.a{color:var(--amber)}
.bigscore{font-family:var(--mono);font-size:46px;font-weight:700;line-height:1}

/* PRIORITY BOARD */
.board{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:880px){.board{grid-template-columns:1fr}}
.col{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px 16px 18px;display:flex;flex-direction:column}
.col-h{display:flex;align-items:center;gap:9px;margin-bottom:13px;padding-bottom:11px;border-bottom:1px solid var(--line-soft)}
.col-h .swatch{width:8px;height:22px;border-radius:3px}
.col-h h3{font-size:13px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase}
.col-h .desc{font-size:11px;color:var(--txt-faint);margin-left:auto;font-family:var(--mono);text-align:right;max-width:160px}
.items{display:flex;flex-direction:column;gap:7px;min-height:40px;flex:1}
.item{
  background:var(--bg);border:1px solid var(--line-soft);border-radius:7px;
  padding:9px 11px;font-size:13.5px;display:flex;align-items:center;gap:9px;
  cursor:grab;transition:border .12s;
}
.item:hover{border-color:var(--line)}
.item .move{font-family:var(--mono);font-size:10px;color:var(--txt-faint);cursor:pointer;padding:2px 5px;border-radius:4px}
.item .move:hover{background:var(--panel-2);color:var(--accent)}
.item .x{margin-left:auto;color:var(--txt-faint);cursor:pointer;font-size:15px;line-height:1;padding:0 3px}
.item .x:hover{color:var(--red)}
.item .txt{flex:1}
.additem{display:flex;gap:7px;margin-top:11px}
.additem input{flex:1;font-size:13px;padding:7px 10px}
.additem button{flex-shrink:0}
.season-banner{
  background:linear-gradient(100deg,var(--accent-soft),transparent);
  border:1px solid #ff5c2b44;border-radius:var(--radius);padding:18px 22px;margin-bottom:18px;
}
.season-banner .lab{font-family:var(--mono);font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--accent)}
.season-banner input{background:transparent;border:none;font-size:22px;font-weight:800;padding:6px 0;letter-spacing:-0.02em;margin-top:2px}
.season-banner input:focus{border:none;border-bottom:1px solid var(--accent)}

/* RULES */
.rule{
  display:flex;gap:14px;padding:14px 16px;background:var(--panel);
  border:1px solid var(--line);border-left:3px solid var(--accent);
  border-radius:8px;margin-bottom:9px;align-items:center;
}
.rule .num{font-family:var(--mono);font-size:13px;color:var(--accent);font-weight:700;flex-shrink:0;width:24px}
.rule .body{font-family:var(--serif);font-size:17px;line-height:1.4}
.rule.editable .body{font-family:var(--sans);font-size:15px}

/* RECURRING */
.freq-tabs{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap}
.freq-tab{
  padding:8px 16px;border-radius:8px;background:var(--panel);border:1px solid var(--line);
  cursor:pointer;font-size:13px;font-weight:600;color:var(--txt-dim);transition:all .14s;
  font-family:var(--mono);letter-spacing:0.04em;
}
.freq-tab:hover{color:var(--txt)}
.freq-tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
.freq-tab .ct{opacity:0.7;margin-left:6px;font-size:11px}
.rtask{display:flex;align-items:center;gap:12px;padding:11px 14px;border-bottom:1px solid var(--line-soft)}
.rtask:last-child{border:none}
.rtask .box{width:19px;height:19px;border-radius:6px;border:1.5px solid var(--line);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;color:transparent;font-weight:700;font-size:11px;transition:all .15s}
.rtask.done .box{background:var(--green);border-color:var(--green);color:#06210b}
.rtask .lbl{flex:1;font-size:14px}
.rtask.done .lbl{color:var(--txt-faint);text-decoration:line-through}
.rtask .freq{font-family:var(--mono);font-size:10px;color:var(--txt-faint);text-transform:uppercase;letter-spacing:0.06em}
.rtask .x{color:var(--txt-faint);cursor:pointer;font-size:15px;padding:0 4px}
.rtask .x:hover{color:var(--red)}

/* EMPTY */
.empty{text-align:center;color:var(--txt-faint);padding:24px;font-family:var(--mono);font-size:12px}

/* MODES */
.mode-toggle{display:flex;gap:0;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:5px;margin-bottom:20px;max-width:420px}
.mode-toggle button{flex:1;padding:12px;border:none;background:none;color:var(--txt-dim);font-weight:700;cursor:pointer;border-radius:7px;font-family:var(--sans);font-size:14px;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:3px}
.mode-toggle button small{font-family:var(--mono);font-size:9.5px;font-weight:500;letter-spacing:0.06em}
.mode-toggle button.active.open{background:var(--green);color:#06210b}
.mode-toggle button.active.ceo{background:var(--accent);color:#fff}

/* PROGRESS BAR in today */
.daybar{display:flex;align-items:center;gap:14px;margin-bottom:20px;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px 18px}
.daybar .track{flex:1;height:8px;background:var(--bg);border-radius:6px;overflow:hidden}
.daybar .fill{height:100%;background:linear-gradient(90deg,var(--accent),#ff8a5c);border-radius:6px;transition:width .4s}
.daybar .pct{font-family:var(--mono);font-weight:700;font-size:15px;min-width:46px;text-align:right}
.daybar .lab{font-family:var(--mono);font-size:11px;color:var(--txt-faint);letter-spacing:0.08em;text-transform:uppercase}

.datestamp{font-family:var(--mono);font-size:11px;color:var(--txt-faint);letter-spacing:0.06em}

.list-note{font-size:12px;color:var(--txt-faint);font-family:var(--mono);margin-top:14px;line-height:1.6;border-top:1px solid var(--line-soft);padding-top:12px}

/* RESET MODAL */
.modal-bg{position:fixed;inset:0;background:#000a;backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:300;padding:20px}
.modal-bg.show{display:flex}
.modal{background:var(--panel);border:1px solid var(--line);border-radius:14px;max-width:520px;width:100%;padding:30px 32px;animation:fade .25s}
.modal h3{font-size:22px;font-weight:800;letter-spacing:-0.02em}
.modal .intro{font-family:var(--serif);font-style:italic;color:var(--txt-dim);font-size:16px;margin:8px 0 22px;line-height:1.5}
.modal .qf{margin-bottom:14px}
.modal .qf label{display:block;font-size:12px;font-weight:600;color:var(--accent);margin-bottom:5px;font-family:var(--mono);letter-spacing:0.04em}
.modal-close{float:right;cursor:pointer;color:var(--txt-faint);font-size:22px;line-height:1;margin-top:-4px}
.modal-close:hover{color:var(--txt)}

.energy-pills{display:flex;gap:8px;flex-wrap:wrap}
.energy-pills button{padding:7px 14px;border-radius:20px;border:1px solid var(--line);background:var(--bg);color:var(--txt-dim);cursor:pointer;font-size:12.5px;font-family:var(--mono);transition:all .14s}
.energy-pills button.sel{background:var(--accent);border-color:var(--accent);color:#fff}

.tomorrow-flag{background:var(--accent-soft);border:1px solid #ff5c2b44;border-radius:8px;padding:12px 14px;margin-bottom:16px;font-size:13.5px}
.tomorrow-flag .lab{font-family:var(--mono);font-size:10px;color:var(--accent);letter-spacing:0.1em;text-transform:uppercase;display:block;margin-bottom:3px}

/* TASK INBOX */
.task-add{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:6px}
.task-add input[type=text]{flex:1;min-width:200px}
.kind-pick{display:flex;gap:0;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:3px;flex-shrink:0}
.kind-pick button{border:none;background:none;color:var(--txt-dim);padding:7px 12px;border-radius:6px;cursor:pointer;font-family:var(--mono);font-size:11px;font-weight:600;transition:all .14s;display:flex;flex-direction:column;align-items:center;line-height:1.3;gap:1px}
.kind-pick button small{font-size:8.5px;font-weight:500;opacity:.8}
.kind-pick button.active{background:var(--accent);color:#fff}
.inbox-rule{font-family:var(--mono);font-size:11px;color:var(--txt-faint);line-height:1.6;margin:4px 0 16px;border-left:2px solid var(--line);padding-left:11px}
.inbox-rule b{color:var(--accent)}
.inbox-cols{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:880px){.inbox-cols{grid-template-columns:1fr}}
.inbox-col{background:var(--bg);border:1px solid var(--line-soft);border-radius:8px;padding:12px}
.inbox-col-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;padding-bottom:8px;border-bottom:1px solid var(--line-soft)}
.inbox-col-h .lab{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:0.04em}
.inbox-col-h .lab.quick{color:var(--amber)}
.inbox-col-h .lab.proj{color:var(--blue)}
.inbox-col-h .ct{font-family:var(--mono);font-size:10px;color:var(--txt-faint)}
.qtask,.ptask{display:flex;align-items:center;gap:9px;padding:8px 9px;border-radius:7px;transition:background .12s}
.qtask:hover,.ptask:hover{background:var(--panel)}
.qtask .box,.ptask .box{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--line);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;color:transparent;font-weight:700;font-size:10px;transition:all .15s}
.qtask.done .box{background:var(--amber);border-color:var(--amber);color:#3a2c00}
.ptask.done .box{background:var(--green);border-color:var(--green);color:#06210b}
.qtask .qtxt,.ptask .ptxt{flex:1;font-size:13.5px}
.qtask.done .qtxt,.ptask.done .ptxt{color:var(--txt-faint);text-decoration:line-through}
.ptask .sched-tag{font-family:var(--mono);font-size:10px;color:var(--green);background:#3fb95018;padding:2px 7px;border-radius:5px;flex-shrink:0}
.ptask .sched-tag.yellow{color:var(--amber);background:color-mix(in srgb, var(--amber) 18%, transparent);font-weight:700}
.ptask.scheduled{border-left:2px solid var(--amber)}
.planblock.scheduled{border-left-color:var(--amber);background:linear-gradient(100deg, color-mix(in srgb, var(--amber) 14%, var(--panel)), var(--panel))}
.date-nav{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.date-arrow{width:34px;height:34px;border-radius:8px;border:1px solid var(--line);background:var(--panel);color:var(--txt-dim);cursor:pointer;font-size:13px;transition:all .14s}
.date-arrow:hover{border-color:var(--accent);color:var(--accent)}
.date-cur{font-size:17px;font-weight:700;min-width:140px}
.date-cur.today{color:var(--accent)}
.rec-kind-pick{display:flex;gap:8px;margin-bottom:12px}
.kp-btn{flex:1;padding:11px;border-radius:9px;border:1px solid var(--line);background:var(--bg);color:var(--txt-dim);cursor:pointer;font-weight:700;font-size:13.5px;font-family:var(--sans);transition:all .14s}
.kp-btn:hover{color:var(--txt)}
.kp-btn.sel{background:var(--accent);border-color:var(--accent);color:#fff}
.ptask .limbo-tag{color:var(--amber);background:#e3b34118}
.ptask .mins{font-family:var(--mono);font-size:10px;color:var(--txt-faint);cursor:pointer;padding:2px 4px;border-radius:4px}
.ptask .mins:hover{background:var(--panel-2);color:var(--accent)}
.qtask .x,.ptask .x{color:var(--txt-faint);cursor:pointer;font-size:15px;padding:0 3px;line-height:1}
.qtask .x:hover,.ptask .x:hover{color:var(--red)}
.ptask.limbo{border-left:2px solid var(--amber)}

/* PLAN PAGE */
.plan-toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:18px}
.day-window{margin-left:auto;display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;color:var(--txt-faint)}
.day-window select{background:var(--bg);border:1px solid var(--line);color:var(--txt);border-radius:6px;padding:5px 8px;font-family:var(--mono);font-size:12px;width:auto}
.plan-wrap{display:grid;grid-template-columns:1fr 300px;gap:18px;align-items:start}
@media(max-width:880px){.plan-wrap{grid-template-columns:1fr}}
.plan-grid{padding:0;position:relative}
.hourrows{position:relative}
.hourrow{display:flex;border-bottom:1px solid var(--line-soft);height:56px}
.hourrow:last-child{border:none}
.hourrow.now{background:linear-gradient(90deg,var(--accent-soft),transparent)}
.hourrow.now .hourlabel{color:var(--accent);font-weight:700}
.hourlabel{width:64px;flex-shrink:0;padding:6px 12px;font-family:var(--mono);font-size:11px;color:var(--txt-faint);text-align:right;border-right:1px solid var(--line-soft)}
.hourslot{flex:1;position:relative;transition:background .12s}
.hourslot.droppable{cursor:pointer}
.hourslot.droppable:hover{background:var(--panel)}
.hourslot.over{background:var(--accent-soft);outline:2px dashed var(--accent);outline-offset:-3px}
.drop-hint{font-family:var(--mono);font-size:10px;color:var(--txt-faint);opacity:0;pointer-events:none;position:absolute;left:10px;top:6px}
.hourslot.droppable:hover .drop-hint{opacity:.7}
/* block layer overlays the rows; offset left by hourlabel width */
.block-layer{position:absolute;top:0;left:64px;right:0;pointer-events:none}
.planblock{position:absolute;left:6px;right:6px;background:linear-gradient(100deg,#1d2024,#191c1f);border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:7px;padding:6px 10px;display:flex;align-items:center;gap:10px;animation:fade .2s;pointer-events:auto;overflow:hidden;box-shadow:0 2px 8px #0003}
.pb-main{flex:1;min-width:0}
.pb-txt{display:block;font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pb-time{font-family:var(--mono);font-size:10px;color:var(--txt-faint)}
.pb-dur{color:var(--amber);cursor:pointer;text-decoration:underline;text-decoration-style:dotted}
.pb-actions{display:flex;gap:4px;flex-shrink:0}
.pb-btn{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--txt-faint);border:1px solid var(--line);font-size:12px;transition:all .14s;background:var(--panel)}
.pb-btn:hover{color:var(--accent);border-color:var(--accent)}
.now-line{position:absolute;left:0;right:6px;height:2px;background:var(--accent);z-index:5;pointer-events:none}
.now-line::before{content:'';position:absolute;left:-4px;top:-3px;width:8px;height:8px;border-radius:50%;background:var(--accent)}
/* duration picker buttons */
.dur-pick{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin:0 0 14px}
.dur-lab{font-family:var(--mono);font-size:11px;color:var(--txt-faint);margin-right:2px}
.dur-btn{padding:6px 12px;border-radius:7px;border:1px solid var(--line);background:var(--bg);color:var(--txt-dim);cursor:pointer;font-family:var(--mono);font-size:12px;transition:all .14s}
.dur-btn:hover{color:var(--txt)}
.dur-btn.sel{background:var(--accent);border-color:var(--accent);color:#fff}
.dur-custom-wrap{display:inline-flex;align-items:center;gap:6px}
.dur-custom-wrap .num-in{width:64px !important}
.dur-custom-row{display:flex;align-items:center;gap:10px}
.dur-custom-row .num-in{width:90px !important}

/* sign-in gate */
.signin-gate{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:radial-gradient(900px 600px at 85% -10%, var(--glow1) 0%, transparent 60%),radial-gradient(700px 500px at 0% 110%, var(--glow2) 0%, transparent 55%),var(--bg);z-index:500;padding:24px}
.signin-card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:40px 36px;max-width:380px;width:100%;text-align:center;box-shadow:0 20px 60px #0006}
.signin-card h1{font-size:26px;font-weight:900;letter-spacing:-0.02em;display:flex;align-items:center;justify-content:center;gap:10px}
.signin-card .dot{width:11px;height:11px;border-radius:50%;background:var(--accent);box-shadow:0 0 14px var(--accent)}
.signin-tag{font-family:var(--mono);font-size:11px;color:var(--txt-faint);letter-spacing:0.1em;margin:14px 0 28px;line-height:1.7;text-transform:uppercase}
.signin-btn{width:100%;padding:13px;font-size:15px}
.signin-msg{margin-top:16px;font-size:12px;color:var(--red);font-family:var(--mono)}
.unsched-list{display:flex;flex-direction:column;gap:7px}
.unsched-item{display:flex;align-items:center;gap:9px;background:var(--bg);border:1px solid var(--line-soft);border-left:2px solid var(--amber);border-radius:7px;padding:9px 10px;cursor:grab;transition:all .14s}
.unsched-item:hover{border-color:var(--line);transform:translateX(2px)}
.unsched-item.dragging{opacity:.4}
.unsched-item.picked{border-color:var(--accent);border-left-color:var(--accent);background:var(--accent-soft)}
.unsched-item .dot{color:var(--blue);font-size:12px}
.unsched-item .utxt{flex:1;font-size:13px}
.unsched-item .umins{font-family:var(--mono);font-size:10px;color:var(--txt-faint)}
.place-banner{background:var(--accent-soft);border:1px solid #ff5c2b44;border-radius:7px;padding:9px 11px;font-size:12px;margin-bottom:12px;font-family:var(--mono)}
.place-banner #cancelPlace{color:var(--accent);cursor:pointer;text-decoration:underline;margin-left:4px}
.scratch .mini{font-size:12px;color:var(--txt-dim);line-height:1.6}
.scratch .mini b{color:var(--txt)}
.int-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-size:13px;color:var(--txt-dim)}
.int-row select{width:auto;padding:6px 9px;font-size:13px}
.int-blocks{display:flex;flex-direction:column;gap:6px;margin-top:4px}
.int-block{text-align:left;background:var(--bg);border:1px solid var(--line);color:var(--txt);padding:9px 11px;border-radius:7px;cursor:pointer;font-family:var(--mono);font-size:12px;transition:all .14s}
.int-block:hover{border-color:var(--accent);color:var(--accent)}

/* CHECK-IN LOGGER */
.checkin-add{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
.checkin-add input{flex:1;min-width:120px;font-size:13px;padding:7px 10px}
.checkin-list{display:flex;flex-direction:column;gap:5px;max-height:200px;overflow-y:auto}
.checkin-row{display:flex;align-items:center;gap:10px;padding:6px 9px;background:var(--bg);border-radius:6px;font-size:12.5px}
.ck-time{font-family:var(--mono);font-size:10px;color:var(--txt-faint);width:42px;flex-shrink:0}
.ck-energy{font-family:var(--mono);font-size:10px;font-weight:700;padding:1px 7px;border-radius:5px;flex-shrink:0}
.ck-energy.e1{background:#f8514920;color:var(--red)}
.ck-energy.e2{background:#e3b34120;color:var(--amber)}
.ck-energy.e3{background:#3fb95020;color:var(--green)}
.ck-mood{flex:1;color:var(--txt-dim)}
.checkin-row .x{color:var(--txt-faint);cursor:pointer;font-size:14px;padding:0 3px}
.checkin-row .x:hover{color:var(--red)}

/* CLEAR BAR */
.clear-bar{display:flex;align-items:center;justify-content:space-between;gap:12px;background:#3fb95012;border:1px solid #3fb95033;border-radius:8px;padding:9px 13px;margin-bottom:14px;font-size:12.5px;color:var(--green);font-family:var(--mono)}
.clear-bar .btn{background:var(--green);color:#06210b}
.clear-bar .btn:hover{background:#4ad15c}

/* ACCOMPLISHMENTS (shutdown) */
.accomplish{border-top:3px solid var(--green)}
.accomplish-list{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.acc-item{display:flex;align-items:center;gap:10px;padding:8px 11px;background:var(--bg);border-radius:7px;font-size:13.5px}
.acc-dot{font-size:12px}.acc-dot.q{color:var(--amber)}.acc-dot.p{color:var(--blue)}
.acc-item span:nth-child(2){flex:1}
.acc-time{font-family:var(--mono);font-size:10px;color:var(--txt-faint)}
.acc-snapshot{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;border-top:1px solid var(--line-soft);padding-top:14px}
@media(max-width:600px){.acc-snapshot{grid-template-columns:1fr 1fr}}
.acc-snapshot .snap{text-align:center}
.acc-snapshot .lab{display:block;font-family:var(--mono);font-size:9px;letter-spacing:0.08em;text-transform:uppercase;color:var(--txt-faint)}
.acc-snapshot .v{font-size:16px;font-weight:700;margin-top:3px;display:block}

/* INSIGHTS */
.ins-summary{border-top:3px solid var(--accent)}
.read-list{display:flex;flex-direction:column;gap:9px}
.read-line{font-size:14px;line-height:1.5;color:var(--txt);padding-left:4px}
.metric-card{text-align:center;padding:18px}
.mc-lab{font-family:var(--mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--txt-faint)}
.mc-val{font-family:var(--mono);font-size:34px;font-weight:700;line-height:1.1;margin:6px 0 4px}
.mc-diff{font-family:var(--mono);font-size:11px;color:var(--txt-faint)}
.mc-diff.high{color:var(--green)}.mc-diff.low{color:var(--red)}.mc-diff.mid{color:var(--amber)}
.chart{width:100%;height:auto;display:block;margin-top:4px}
.ctick{fill:var(--txt-faint);font-family:var(--mono);font-size:9px}
.cval{fill:var(--txt-dim);font-family:var(--mono);font-size:9px;text-anchor:middle}
.chart-x{display:flex;font-family:var(--mono);font-size:9px;color:var(--txt-faint);margin-top:2px;padding:0 18px}
.abar{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.abar-lab{width:120px;flex-shrink:0;font-size:12px;color:var(--txt-dim)}
.abar-track{flex:1;height:8px;background:var(--bg);border-radius:5px;overflow:hidden}
.abar-fill{height:100%;border-radius:5px;transition:width .4s}
.abar-fill.low{background:var(--red)}.abar-fill.mid{background:var(--amber)}.abar-fill.high{background:var(--green)}
.abar-v{font-family:var(--mono);font-size:11px;font-weight:700;width:20px;text-align:right}
.mood-cloud{display:flex;flex-wrap:wrap;gap:6px 14px;align-items:baseline;padding:6px 0}
.mood-word{font-family:var(--serif);color:var(--txt);line-height:1.2}
.mood-word sub{font-family:var(--mono);font-size:9px;color:var(--accent);vertical-align:super}
.drift-list{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.drift-entry{font-family:var(--serif);font-style:italic;font-size:14.5px;color:var(--txt-dim);padding:9px 13px;background:var(--bg);border-left:2px solid var(--amber);border-radius:6px}
.daylog{display:flex;flex-direction:column;gap:4px}
.dl-row{display:flex;align-items:center;gap:12px;padding:8px 11px;background:var(--bg);border-radius:6px;font-size:12.5px}
.dl-date{font-family:var(--mono);font-size:11px;width:64px;flex-shrink:0;color:var(--txt-dim)}
.dl-energy{font-family:var(--mono);font-size:10px;font-weight:700;width:48px;flex-shrink:0;color:var(--txt-faint)}
.dl-energy.low{color:var(--red)}.dl-energy.mid{color:var(--amber)}.dl-energy.high{color:var(--green)}
.dl-mood{flex:1;color:var(--txt-dim)}
.dl-done{font-family:var(--mono);font-size:11px;color:var(--accent);width:60px;text-align:right;flex-shrink:0}
.dl-sleep{font-family:var(--mono);font-size:10px;color:var(--txt-faint);width:80px;text-align:right;flex-shrink:0}
@media(max-width:600px){.dl-sleep,.dl-mood{display:none}}

/* TODAY — radical simplicity */
.phead.compact{margin-bottom:16px}
.focus-hero{background:linear-gradient(110deg,var(--accent-soft),transparent 70%);border:1px solid var(--accent);border-radius:14px;padding:22px 24px;margin-bottom:20px}
.focus-hero .fh-lab{font-family:var(--mono);font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:var(--accent);display:block;margin-bottom:9px}
.focus-hero input{background:transparent;border:none;font-size:26px;font-weight:800;letter-spacing:-0.02em;padding:0;width:100%}
.focus-hero input:focus{outline:none;border:none}
.focus-hero input::placeholder{color:var(--txt-faint);font-weight:700}

/* big task card */
.big-card{padding:22px 24px}
.big-task{padding:13px 13px}
.big-task .box{width:24px;height:24px;border-radius:7px}
.big-task .qtxt,.big-task .ptxt{font-size:16px;font-weight:500}
.theme-btn{width:100%;background:none;border:1px solid var(--line);color:var(--txt-dim);padding:9px;border-radius:8px;cursor:pointer;font-size:15px;margin-top:8px;transition:all .15s}
.theme-btn:hover{border-color:var(--accent);color:var(--accent)}

/* project chip on task */
.proj-chip{display:inline-block;margin-left:8px;font-family:var(--mono);font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;background:color-mix(in srgb, var(--pc) 18%, transparent);color:var(--pc);vertical-align:middle}
.proj-pick{cursor:pointer;color:var(--txt-faint);font-size:15px;padding:0 4px;flex-shrink:0;transition:color .12s}
.proj-pick:hover{color:var(--accent)}

/* PROJECTS page */
.proj-stack{display:flex;flex-direction:column;gap:12px}
.proj-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px 18px}
.proj-card.fin{opacity:.6}
.proj-bar-top{display:flex;align-items:center;gap:11px;margin-bottom:12px}
.proj-swatch{width:14px;height:14px;border-radius:4px;flex-shrink:0}
.proj-name-in{flex:1;background:transparent;border:none;font-size:17px;font-weight:700;color:var(--txt);padding:2px 0;min-width:80px}
.proj-name-in:focus{outline:none;border-bottom:1px solid var(--accent)}
.proj-stat{font-family:var(--mono);font-size:12px;color:var(--txt-faint);flex-shrink:0}
.proj-act{cursor:pointer;color:var(--txt-faint);font-size:15px;padding:0 4px;flex-shrink:0}
.proj-act:hover{color:var(--green)}
.proj-card .x{color:var(--txt-faint);cursor:pointer;font-size:18px;padding:0 3px;flex-shrink:0}
.proj-card .x:hover{color:var(--red)}
.proj-track{height:10px;background:var(--bg);border-radius:6px;overflow:hidden}
.proj-fill{height:100%;border-radius:6px;transition:width .4s}
.proj-meta{font-family:var(--mono);font-size:11px;color:var(--txt-faint);margin-top:8px}
.proj-add{display:flex;gap:10px}
.proj-add input{flex:1}

/* project task list */
.proj-tasks{display:flex;flex-direction:column;gap:5px;margin:12px 0 10px}
.ptask-row{display:flex;align-items:center;gap:9px;padding:7px 9px;background:var(--bg);border-radius:7px;font-size:14px}
.ptask-row .box{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--line);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;color:transparent;font-weight:700;font-size:10px;transition:all .15s}
.ptask-row.done .box{background:var(--green);border-color:var(--green);color:#06210b}
.ptask-row .ptxt{flex:1}
.ptask-row.done .ptxt{color:var(--txt-faint);text-decoration:line-through}
.ptask-row .to-today{font-family:var(--mono);font-size:10px;color:var(--accent);cursor:pointer;padding:2px 8px;border:1px solid var(--accent);border-radius:5px;flex-shrink:0;transition:all .12s}
.ptask-row .to-today:hover{background:var(--accent);color:#fff}
.ptask-row .in-today{font-family:var(--mono);font-size:10px;color:var(--green);flex-shrink:0}
.ptask-row .x{color:var(--txt-faint);cursor:pointer;font-size:14px;padding:0 3px;flex-shrink:0}
.ptask-row .x:hover{color:var(--red)}
.proj-add-task{display:flex;gap:8px}
.proj-add-task input{flex:1;font-size:13px;padding:7px 10px}
.empty.sm{padding:8px;font-size:11px}

/* PLAN tabs */
.plan-tabs{display:flex;gap:6px;margin-bottom:18px}
.plan-tab{padding:9px 20px;border-radius:9px;border:1px solid var(--line);background:var(--panel);color:var(--txt-dim);cursor:pointer;font-weight:700;font-size:14px;font-family:var(--sans);transition:all .14s}
.plan-tab:hover{color:var(--txt)}
.plan-tab.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* WEEK view */
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
@media(max-width:760px){.week-grid{grid-template-columns:repeat(2,1fr)}}
.wk-day{background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:10px;min-height:120px}
.wk-day.is-today{border-color:var(--accent);background:var(--accent-soft)}
.wk-day-h{display:flex;align-items:baseline;gap:6px;margin-bottom:8px;padding-bottom:7px;border-bottom:1px solid var(--line-soft)}
.wk-dow{font-family:var(--mono);font-size:10px;color:var(--txt-faint);text-transform:uppercase}
.wk-date{font-size:16px;font-weight:700}
.wk-now{font-family:var(--mono);font-size:8px;background:var(--accent);color:#fff;padding:1px 5px;border-radius:10px;margin-left:auto}
.wk-items{display:flex;flex-direction:column;gap:4px}
.wk-item{display:flex;align-items:baseline;gap:5px;font-size:11.5px;line-height:1.3}
.wk-item .wk-time{font-family:var(--mono);font-size:9px;color:var(--accent);flex-shrink:0}
.wk-item .wk-rec{color:var(--blue);font-size:10px;flex-shrink:0}
.wk-item .wk-done{text-decoration:line-through;color:var(--txt-faint)}
.wk-empty{color:var(--txt-faint);font-size:11px}

/* MONTH view */
.month-grid-head{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:5px}
.month-grid-head span{font-family:var(--mono);font-size:10px;color:var(--txt-faint);text-align:center;text-transform:uppercase}
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.mo-cell{aspect-ratio:1;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:6px;position:relative;display:flex;flex-direction:column;align-items:flex-start;gap:3px}
.mo-cell.blank{background:none;border:none}
.mo-cell.past{opacity:.5}
.mo-cell.is-today{border-color:var(--accent);background:var(--accent-soft)}
.mo-num{font-family:var(--mono);font-size:12px;font-weight:700}
.mo-dot{font-size:9px;font-family:var(--mono)}
.mo-dot.block{color:var(--accent)}
.mo-dot.rec{color:var(--blue)}
@media(max-width:600px){.mo-cell{padding:4px}.mo-num{font-size:10px}}

.panel{border:1px solid var(--line);border-radius:10px;margin-bottom:10px;background:var(--panel);overflow:hidden}
.panel.open{border-color:var(--line)}
.panel-h{width:100%;display:flex;align-items:center;gap:11px;padding:14px 18px;background:none;border:none;cursor:pointer;font-family:var(--sans);text-align:left;color:var(--txt);transition:background .12s}
.panel-h:hover{background:var(--panel-2)}
.panel-caret{font-size:11px;color:var(--txt-faint);width:12px;flex-shrink:0}
.panel-title{font-weight:700;font-size:14px;letter-spacing:0.01em}
.panel-meta{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--txt-faint)}
.panel-body{padding:4px 18px 18px;animation:fade .2s}

<script>
/* ============================================================
   MarcoMaster — personal operating system
   Cloud sync via Firebase (Firestore) with localStorage cache
   so it loads instantly and works offline, then syncs.
   ============================================================ */

/* ---------- Firebase handles (set up in init) ---------- */
let FB={ app:null, auth:null, db:null, user:null, ready:false };

/* ---------- storage layer ----------
   - localStorage = instant local cache (per device)
   - Firestore   = source of truth, synced across devices
   Reads prefer the freshest of the two; writes go to both.    */
const Store = {
  mem:{},
  _lsGet(k){ try{ const v=localStorage.getItem(k); return v?JSON.parse(v):null; }catch(e){ return this.mem[k]??null; } },
  _lsSet(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){ this.mem[k]=v; } },

  // load: try Firestore first (if signed in), fall back to local cache
  async get(k){
    if(FB.user && FB.db){
      try{
        const snap=await FB.db.collection('users').doc(FB.user.uid).get();
        if(snap.exists){
          const data=snap.data();
          if(data && data[k]!=null){
            this._lsSet(k,data[k]);     // refresh local cache
            return data[k];
          }
        }
      }catch(e){ console.warn('Firestore read failed, using cache',e); }
    }
    return this._lsGet(k);
  },

  // save: write local immediately, then push to Firestore
  async set(k,v){
    this._lsSet(k,v);
    if(FB.user && FB.db){
      try{
        await FB.db.collection('users').doc(FB.user.uid).set({ [k]:v, _updated:Date.now() }, {merge:true});
      }catch(e){ console.warn('Firestore write failed (saved locally)',e); }
    }
  }
};

/* ---------- date helpers ---------- */
const todayKey = ()=>{ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); };
const weekKey = ()=>{ const d=new Date(); const o=new Date(d); o.setDate(d.getDate()-((d.getDay()+6)%7)); return 'wk-'+o.getFullYear()+'-'+String(o.getMonth()+1).padStart(2,'0')+'-'+String(o.getDate()).padStart(2,'0'); };
const prettyDate = ()=> new Date().toLocaleDateString('en-CA',{weekday:'long',month:'long',day:'numeric'});

/* ---------- default recurring tasks ----------
   every = interval in days (1=daily, 7=weekly, 30=monthly, 90=quarterly, or custom like 5)
   last  = ISO date string of last completion (null = never, so due now)
   auto  = whether it auto-adds to Today's task list when due
   kind  = 'quick' or 'project' when it lands in the inbox                       */
const DEFAULT_RECURRING = [
  {id:'r1', t:'Run MarcoMaster Daily Reset', every:1, kind:'quick', auto:true, last:null},
  {id:'r2', t:'Workout / movement', every:1, kind:'project', auto:true, last:null},
  {id:'r3', t:'Take supplements', every:1, kind:'quick', auto:true, last:null},
  {id:'r4', t:'Follow nutrition plan', every:1, kind:'quick', auto:true, last:null},
  {id:'r5', t:'Check calendar', every:1, kind:'quick', auto:true, last:null},
  {id:'r6', t:'Protect CEO time', every:1, kind:'project', auto:true, last:null},
  {id:'r7', t:'Night shutdown journal', every:1, kind:'quick', auto:true, last:null},
  {id:'r8', t:'Weekly CEO Review', every:7, kind:'project', auto:true, last:null},
  {id:'r9', t:'Plan workouts', every:7, kind:'project', auto:true, last:null},
  {id:'r10', t:'Plan nutrition / groceries', every:7, kind:'project', auto:true, last:null},
  {id:'r11', t:'Review business priorities', every:7, kind:'project', auto:true, last:null},
  {id:'r12', t:'Review personal brand / content plan', every:7, kind:'project', auto:true, last:null},
  {id:'r13', t:'Review relationships / personal life', every:7, kind:'project', auto:true, last:null},
  {id:'r14', t:'Maintain MarcoMaster', every:7, kind:'project', auto:true, last:null},
  {id:'r15', t:'Review goals', every:30, kind:'project', auto:true, last:null},
  {id:'r16', t:'Review current season', every:30, kind:'project', auto:true, last:null},
  {id:'r17', t:'Review finances / subscriptions', every:30, kind:'project', auto:true, last:null},
  {id:'r18', t:'Update priority board', every:30, kind:'project', auto:true, last:null},
  {id:'r19', t:'Review business leverage', every:30, kind:'project', auto:true, last:null},
  {id:'r20', t:'Choose current life / business season', every:90, kind:'project', auto:true, last:null},
  {id:'r21', t:'Set Must-Win priorities', every:90, kind:'project', auto:true, last:null},
  {id:'r22', t:'Review Future Self Narrative', every:90, kind:'project', auto:true, last:null},
  {id:'r23', t:'Move items into Parking Lot', every:90, kind:'project', auto:true, last:null},
  {id:'r24', t:'Decide what does NOT get attention', every:90, kind:'project', auto:true, last:null},
];

const DEFAULT_RULES = [
  "I do not trust memory. I trust systems.",
  "I do not start reacting until I run MarcoMaster.",
  "Fitness is not optional. Fitness is infrastructure.",
  "I protect CEO time. Open-door time and CEO time are different.",
  "I do not solve problems employees can solve.",
  "The app solves recurring pain. It is not a hobby project.",
  "I do not let urgency steal importance.",
  "I build systems before I chase freedom.",
  "I do not need to do everything. I need to do the right things consistently.",
  "Freedom is created by systems, not by doing more.",
  "If I do not direct my attention, the world will take it.",
];

const DEFAULT_BOARD = {
  mustwin:[
    {id:b(),txt:'Sleep / health / allergies'},
    {id:b(),txt:'Business operations'},
    {id:b(),txt:'App rollout — TaskMaster / PerformanceMaster / MechanicMaster'},
    {id:b(),txt:'Consistent personal brand posting'},
  ],
  scheduled:[
    {id:b(),txt:'Gazebo roof decision'},
    {id:b(),txt:'Backyard irrigation'},
    {id:b(),txt:'Backyard electrical'},
    {id:b(),txt:'Client messages (batch)'},
    {id:b(),txt:'Amplify subscription'},
    {id:b(),txt:'QuickBooks setup'},
    {id:b(),txt:'Employee meetings'},
  ],
  parking:[
    {id:b(),txt:'Boxing'},
    {id:b(),txt:'Muay Thai'},
    {id:b(),txt:'Future mentorship offer'},
    {id:b(),txt:'Extra app features'},
    {id:b(),txt:'New business ideas'},
    {id:b(),txt:'Big content strategy overhaul'},
  ],
};

const SCORE_AREAS = ['Sleep','Nutrition','Training','Energy','Emotional stability','Business focus','Systems progress','Content consistency','Relationships','Freedom'];

/* default Daily Reset checklist (editable in Settings) */
const DEFAULT_RESET_STEPS = [
  ['biz',"Choose today's #1 business outcome"],
  ['health',"Choose today's #1 health action"],
  ['lev',"Choose today's #1 systems / leverage action"],
  ['content',"Choose today's #1 content / personal brand action"],
  ['not',"Choose one thing I am intentionally NOT working on"],
  ['workout',"Confirm workout time"],
  ['shutdown',"Confirm shutdown time"],
];

function b(){ return 'i'+Math.random().toString(36).slice(2,9); }

/* ---------- global state ---------- */
let S = {};   // full app state, persisted under 'marcomaster'

async function loadState(){
  S = await Store.get('marcomaster') || {};
  // seed defaults once
  if(!S.recurring){
    S.recurring = JSON.parse(JSON.stringify(DEFAULT_RECURRING));
    // first-run staggering: only daily tasks are due immediately; longer cadences
    // start their clock today so they surface on their natural schedule, not all at once
    const k=todayKey();
    S.recurring.forEach(r=>{ if(r.every>1) r.last=k; });
  }
  if(!S.rules) S.rules = [...DEFAULT_RULES];
  if(!S.board) S.board = JSON.parse(JSON.stringify(DEFAULT_BOARD));
  if(!S.season) S.season = 'Business Stabilization + Health Rebuild + Content Restart';
  if(!S.narrative) S.narrative = '';
  if(!S.projects) S.projects = [
    {id:b(), name:'CrewMaster', color:'#58a6ff', done:false, tasks:[]},
    {id:b(), name:'Backyard Landscaping', color:'#3fb950', done:false, tasks:[]},
  ];
  // migrate: ensure every project has a tasks array
  S.projects.forEach(p=>{ if(!p.tasks) p.tasks=[]; });
  if(!S.theme) S.theme='dark';
  if(!S.recurringDone) S.recurringDone = {};   // legacy; kept for back-compat
  if(!S.days) S.days = {};        // per-day "today" data
  if(!S.weeks) S.weeks = {};      // per-week review + scorecard
  if(!S.mode) S.mode = 'open';
  // settings (editable reset checklist, day window, etc.)
  if(!S.settings) S.settings = {
    resetSteps: DEFAULT_RESET_STEPS.map(s=>({id:s[0],label:s[1]})),
    dayStart: 8, dayEnd: 21,
    autoAddRecurring: true,
    showMore: false,
  };
  if(!S.settings.resetSteps) S.settings.resetSteps = DEFAULT_RESET_STEPS.map(s=>({id:s[0],label:s[1]}));
  if(S.settings.dayStart==null) S.settings.dayStart=8;
  if(S.settings.dayEnd==null) S.settings.dayEnd=21;
  if(S.settings.autoAddRecurring==null) S.settings.autoAddRecurring=true;
  if(S.settings.showMore==null) S.settings.showMore=false;
  // migrate old recurring shape ({f:'daily'}) → cadence model
  const FREQ_DAYS={daily:1,weekly:7,monthly:30,quarterly:90};
  S.recurring.forEach(r=>{
    if(r.every==null && r.mode==null){ r.every = FREQ_DAYS[r.f]||1; }
    if(r.mode==null){ r.mode='everyN'; if(r.every==null) r.every=1; }
    if(r.kind==null){ r.kind = (r.every&&r.every<=1)?'quick':'project'; }
    if(r.auto==null){ r.auto = true; }
    if(!('last' in r)){ r.last = null; }
  });
  // migrate scheduled tasks (had start, no schedDate) across all days
  Object.keys(S.days||{}).forEach(dk=>{
    (S.days[dk].tasks||[]).forEach(t=>{ if(t.kind==='project' && t.start!=null && t.schedDate==null) t.schedDate=dk; });
  });
  await persist();
}
async function persist(){ await Store.set('marcomaster', S); }

let saveTimer=null;
function save(showToast=true){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{ await persist(); if(showToast) toast(); }, 350);
}
function toast(msg='Saved ✓'){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(t._tm); t._tm=setTimeout(()=>t.classList.remove('show'),1400);
}

/* today's data object (auto-creates, never carries checkmarks forward) */
function day(){
  const k=todayKey();
  if(!S.days[k]) S.days[k]={
    reset:{}, focus:{biz:'',health:'',lev:'',content:'',not:''},
    workout:'', shutdownTime:'', energy:'', mood:'', sleep:'', stress:'',
    tasks:[],          // {id, txt, kind:'quick'|'project', done, mins, start:null, recurringId?}
    archive:[],        // completed tasks swept here: {id, txt, kind, mins, doneAt}
    checkins:[],       // {t:'HH:MM', ts, energy:1-5, mood:'word'}  throughout-day log
    tomorrow:[],       // top-3 picked at shutdown for next day  (strings)
    recurringAdded:{}, // {recurringId:true} injected into today already
    skipped:{},        // {recurringId:true} skipped this cycle
    dayStart:8,        // first hour shown on the Plan grid (24h)
    dayEnd:21,         // last hour shown
    shutdown:{ well:'',drift:'',avoid:'',trained:false,health:false,time:false,firstMove:'',clear:'' }
  };
  const d=S.days[k];
  // migrations for days created before these fields existed
  if(!d.tasks) d.tasks=[];
  if(!d.archive) d.archive=[];
  if(!d.checkins) d.checkins=[];
  if(!d.tomorrow) d.tomorrow=[];
  if(!d.recurringAdded) d.recurringAdded={};
  if(!d.skipped) d.skipped={};
  if(d.dayStart==null) d.dayStart=(S.settings&&S.settings.dayStart)||8;
  if(d.dayEnd==null) d.dayEnd=(S.settings&&S.settings.dayEnd)||21;
  // migrate: a task that had a start hour but no schedDate was scheduled for its own day
  d.tasks.forEach(t=>{ if(t.kind==='project' && t.start!=null && t.schedDate==null) t.schedDate=k; });
  // bridge: if this day is brand new and yesterday flagged a top-3, seed them once
  if(!d._seeded){
    d._seeded=true;
    const prevKey=Object.keys(S.days).filter(x=>x<k).sort().pop();
    if(prevKey){
      const picks=(S.days[prevKey].tomorrow||[]).filter(p=>p&&p.trim());
      picks.forEach(p=>d.tasks.push({id:b(),txt:p,kind:'project',done:false,mins:60,start:null,schedDate:null,fromYesterday:true}));
    }
    if(typeof persist==='function') Promise.resolve().then(persist);
  }
  return d;
}

/* numeric energy map for charts/averages */
const ENERGY_NUM={Low:1,Medium:2,High:3};
function energyToNum(v){ return ENERGY_NUM[v]||null; }

/* ---------- task helpers ---------- */
const QUICK_LIMIT=2;   // a "quick" task is <= this many minutes
function quickTasks(){ return day().tasks.filter(t=>t.kind==='quick'); }
function projectTasks(){ return day().tasks.filter(t=>t.kind==='project'); }
/* today's task scheduled-state, used by the inbox display */
function scheduledProjects(){ return projectTasks().filter(t=>t.schedDate!=null).sort((a,b)=>(a.start||0)-(b.start||0)); }
function unscheduledProjects(){ return projectTasks().filter(t=>t.schedDate==null && !t.done); }

/* ---- GLOBAL pool across all days (for the Time Blocker) ----
   Each entry: {t (task ref), dayKey (which day's record it lives in)} */
function allTimeBlockTasks(){
  const out=[];
  Object.keys(S.days||{}).forEach(dk=>{
    (S.days[dk].tasks||[]).forEach(t=>{ if(t.kind==='project') out.push({t,dayKey:dk}); });
  });
  return out;
}
function poolUnscheduled(){ return allTimeBlockTasks().filter(e=>e.t.schedDate==null && !e.t.done); }
function scheduledOn(dateKey){ return allTimeBlockTasks().filter(e=>e.t.schedDate===dateKey && !e.t.done).sort((a,b)=>(a.t.start||0)-(b.t.start||0)); }
function findTaskGlobal(id){
  for(const dk of Object.keys(S.days||{})){
    const t=(S.days[dk].tasks||[]).find(x=>x.id===id);
    if(t) return {t,dayKey:dk};
  }
  return null;
}

function completedToday(){
  const live=day().tasks.filter(t=>t.done);
  return [...day().archive, ...live];
}
function fmtHour(h){
  const hr=Math.floor(h); const m=Math.round((h-hr)*60);
  const ampm=hr>=12?'pm':'am'; let disp=hr%12; if(disp===0)disp=12;
  return disp+(m?':'+String(m).padStart(2,'0'):'')+ampm;
}
function shortDate(k){ const [y,m,d]=k.split('-').map(Number); return new Date(y,m-1,d).toLocaleDateString('en-CA',{month:'short',day:'numeric'}); }
function schedLabel(t){
  if(t.schedDate==null) return '';
  const datePart = (t.schedDate===todayKey())?'Today':shortDate(t.schedDate);
  return datePart + (t.start!=null?(' · '+fmtHour(t.start)):'');
}
function nowHM(){ const d=new Date(); return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }

/* ---------- duration ---------- */
const DURATION_PRESETS=[15,30,45,60,90,120,180];   // minutes
function fmtDuration(m){
  if(m==null) return '';
  if(m<60) return m+'m';
  const h=m/60;
  return (Number.isInteger(h)?h:h.toFixed(1).replace('.0',''))+'h';
}

function addTask(txt,kind,mins){
  txt=txt.trim(); if(!txt) return;
  day().tasks.push({id:b(),txt,kind,done:false,mins:mins||(kind==='quick'?2:60),start:null,schedDate:null});
  save();
}
function archiveCompleted(){
  const d=day();
  const done=d.tasks.filter(t=>t.done);
  done.forEach(t=>d.archive.push({id:t.id,txt:t.txt,kind:t.kind,mins:t.mins,doneAt:nowHM()}));
  d.tasks=d.tasks.filter(t=>!t.done);
  save();
}
function week(){
  const k=weekKey();
  if(!S.weeks[k]) S.weeks[k]={ review:{}, scores:{} };
  return S.weeks[k];
}

/* ---------- recurring cadence engine ----------
   A recurring task has one of three schedule modes:
   - mode:'everyN'    => every `every` days since last completion (1=daily)
   - mode:'weekdays'  => due on specific days of week, dows:[0..6] (0=Sun)
   - mode:'monthDay'  => due on a calendar date each month, dom:1..31
   Back-compat: tasks with only `every` are treated as everyN.            */
function daysBetween(aKey,bKey){
  const [ay,am,ad]=aKey.split('-').map(Number), [by,bm,bd]=bKey.split('-').map(Number);
  const a=new Date(ay,am-1,ad), b2=new Date(by,bm-1,bd);
  return Math.round((b2-a)/86400000);
}
function dateFromKey(k){ const [y,m,d]=k.split('-').map(Number); return new Date(y,m-1,d); }
const DOW_NAMES=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function recMode(r){ return r.mode || 'everyN'; }

function cadenceLabel(r){
  const m=recMode(r);
  if(m==='weekdays'){
    const ds=(r.dows||[]).slice().sort();
    if(ds.length===7) return 'every day';
    if(ds.length===0) return 'no days set';
    // recognise common combos
    if(ds.join()==='1,2,3,4,5') return 'weekdays (Mon–Fri)';
    if(ds.join()==='0,6') return 'weekends';
    return ds.map(d=>DOW_NAMES[d]).join(', ');
  }
  if(m==='monthDay'){
    if(r.dom==='last') return 'last day of month';
    const d=r.dom||1; const suf=(d%10===1&&d!==11)?'st':(d%10===2&&d!==12)?'nd':(d%10===3&&d!==13)?'rd':'th';
    return `${d}${suf} of month`;
  }
  // everyN
  const n=r.every||1;
  if(n===1) return 'daily';
  if(n===7) return 'weekly';
  if(n===14) return 'every 2 weeks';
  if(n===30) return 'monthly';
  if(n===90) return 'quarterly';
  return `every ${n} days`;
}

function recurringDue(r,k){
  k=k||todayKey();
  if(r.snoozeUntil && r.snoozeUntil>k) return false;   // snoozed
  const m=recMode(r);
  const today=dateFromKey(k);
  if(m==='weekdays'){
    const dows=r.dows||[];
    if(!dows.includes(today.getDay())) return false;
    // don't re-fire if already completed today
    return r.last!==k;
  }
  if(m==='monthDay'){
    const dim=new Date(today.getFullYear(),today.getMonth()+1,0).getDate();
    const target=(r.dom==='last')?dim:Math.min(r.dom||1,dim);
    if(today.getDate()!==target) return false;
    return r.last!==k;
  }
  // everyN
  if(!r.last) return true;
  return daysBetween(r.last,k) >= (r.every||1);
}

/* next-due label for the manager view */
function nextDueLabel(r){
  const k=todayKey();
  if(r.snoozeUntil && r.snoozeUntil>k) return 'snoozed → '+prettyKeyShort(r.snoozeUntil);
  if(recurringDue(r)) return 'due today';
  const m=recMode(r);
  if(m==='weekdays'){
    const dows=(r.dows||[]).slice().sort();
    if(!dows.length) return 'no days set';
    const todayDow=dateFromKey(k).getDay();
    for(let i=1;i<=7;i++){ if(dows.includes((todayDow+i)%7)) return i===1?'due tomorrow':`due ${DOW_NAMES[(todayDow+i)%7]}`; }
    return 'scheduled';
  }
  if(m==='monthDay'){
    const t=dateFromKey(k);
    const dim=new Date(t.getFullYear(),t.getMonth()+1,0).getDate();
    const target=(r.dom==='last')?dim:Math.min(r.dom||1,dim);
    if(t.getDate()<target){ const diff=target-t.getDate(); return diff===1?'due tomorrow':`due in ${diff}d`; }
    return r.dom==='last'?'due end of next month':'due next month';
  }
  // everyN
  if(!r.last) return 'due today';
  const remain=(r.every||1)-daysBetween(r.last,k);
  if(remain<=0) return 'due today';
  if(remain===1) return 'due tomorrow';
  return `due in ${remain}d`;
}
function prettyKeyShort(k){ const [y,m,dd]=k.split('-'); return new Date(y,m-1,dd).toLocaleDateString('en-CA',{month:'short',day:'numeric'}); }

function dueRecurring(){ return S.recurring.filter(r=>r.auto!==false && recurringDue(r)); }

/* auto-add due recurring tasks into today's inbox (once per day, idempotent) */
function syncRecurringIntoToday(){
  if(S.settings && S.settings.autoAddRecurring===false) return;
  const d=day();
  if(!d.recurringAdded) d.recurringAdded={};
  dueRecurring().forEach(r=>{
    if(d.recurringAdded[r.id]) return;
    if(d.skipped && d.skipped[r.id]) return;
    d.tasks.push({id:b(),txt:r.t,kind:r.kind||'quick',done:false,mins:r.kind==='project'?60:2,start:null,recurringId:r.id});
    d.recurringAdded[r.id]=true;
  });
}
function markRecurringDone(recurringId){
  const r=S.recurring.find(x=>x.id===recurringId);
  if(r){ r.last=todayKey(); if(r.snoozeUntil) delete r.snoozeUntil; }
}

let taskDraft={kind:'quick', mins:60, customOpen:false};
function bindTaskInbox(){
  q('#kindPick [data-kind]','all').forEach(el=>el.onclick=()=>{

  });
  // duration presets
  q('[data-dur]','all').forEach(el=>el.onclick=()=>{ taskDraft.mins=+el.dataset.dur; taskDraft.customOpen=false; rerender(); });
  const dc=q('#durCustom'); if(dc) dc.onclick=()=>{ taskDraft.customOpen=true; rerender(); setTimeout(()=>{ const ci=q('#durCustomInput'); if(ci) ci.focus(); },0); };
  const dci=q('#durCustomInput'); if(dci) dci.oninput=()=>{ const n=parseInt(dci.value,10); if(!isNaN(n)&&n>0) taskDraft.mins=n; };
  const addBtn=q('#taskAddBtn');
  const doAdd=()=>{
    const i=q('#taskInput'); const v=i.value.trim(); if(!v)return;
    addTask(v, taskDraft.kind, taskDraft.kind==='project'?taskDraft.mins:2);
    rerender();
  };
  if(addBtn) addBtn.onclick=doAdd;
  const ti=q('#taskInput'); if(ti) ti.onkeydown=e=>{ if(e.key==='Enter') doAdd(); };
  q('[data-tdone]','all').forEach(el=>el.onclick=()=>{
    const t=day().tasks.find(x=>x.id===el.dataset.tdone);
    if(t){
      t.done=!t.done;
      if(t.done && t.recurringId) markRecurringDone(t.recurringId);
      if(t.projectId && t.projTaskId){
        const p=S.projects.find(x=>x.id===t.projectId);
        const pt=p&&p.tasks.find(x=>x.id===t.projTaskId);
        if(pt) pt.done=t.done;   // keep project progress in sync
      }
      save(false); rerender();
    }
  });
  q('[data-tdel]','all').forEach(el=>el.onclick=()=>{
    day().tasks=day().tasks.filter(x=>x.id!==el.dataset.tdel); save(); rerender();
  });
  q('[data-tmins]','all').forEach(el=>el.onclick=()=>{
    openDurationPicker(el.dataset.tmins);
  });
  const gp=q('#goPlan'); if(gp) gp.onclick=()=>go('plan');
  const cc=q('#clearCompleted'); if(cc) cc.onclick=()=>{
    archiveCompleted(); toast('Cleared & archived'); rerender();
  };
  // snooze a recurring task to tomorrow (removes from today, won't re-add today)
  q('[data-snooze]','all').forEach(el=>el.onclick=()=>{
    const [rid,tid]=el.dataset.snooze.split('|');
    const r=S.recurring.find(x=>x.id===rid);
    if(r){ const t=new Date(); t.setDate(t.getDate()+1); r.snoozeUntil=t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0'); }
    day().tasks=day().tasks.filter(x=>x.id!==tid);
    if(day().recurringAdded) day().recurringAdded[rid]=true; // don't re-add today
    save(); toast('Snoozed to tomorrow'); rerender();
  });
  // skip this cycle (mark last=today so next due is a full interval out)
  q('[data-skip]','all').forEach(el=>el.onclick=()=>{
    const [rid,tid]=el.dataset.skip.split('|');
    const r=S.recurring.find(x=>x.id===rid);
    if(r){ r.last=todayKey(); }
    day().tasks=day().tasks.filter(x=>x.id!==tid);
    if(day().skipped) day().skipped[rid]=true;
    save(); toast('Skipped this cycle'); rerender();
  });
}

function bindRecurring(){
  // existing task header edits
  q('[data-recname]','all').forEach(el=>el.oninput=()=>{ const r=S.recurring.find(x=>x.id===el.dataset.recname); if(r){ r.t=el.value; save(); } });
  q('[data-reckind]','all').forEach(el=>el.onclick=()=>{ const r=S.recurring.find(x=>x.id===el.dataset.reckind); if(r){ r.kind=r.kind==='quick'?'project':'quick'; save(); rerender(); } });
  q('[data-recauto]','all').forEach(el=>el.onclick=()=>{ const r=S.recurring.find(x=>x.id===el.dataset.recauto); if(r){ r.auto=r.auto===false?true:false; save(); rerender(); } });
  q('[data-rdel]','all').forEach(el=>el.onclick=()=>{ S.recurring=S.recurring.filter(r=>r.id!==el.dataset.rdel); save(); rerender(); });

  // resolve a scope string to the target object (draft or recurring task)
  const target=scope=> scope==='new' ? newRec : S.recurring.find(x=>x.id===scope);

  // unified schedule handlers
  q('[data-sched]','all').forEach(el=>{
    const [scope,action,val]=el.dataset.sched.split('|');
    const r=target(scope); if(!r) return;
    if(action==='mode'){
      el.onclick=()=>{ r.mode=val; ensureSchedDefaults(r); if(scope!=='new') save(); rerender(); };
    } else if(action==='dow'){
      el.onclick=()=>{ toggleDow(r,+val); r.mode='weekdays'; if(scope!=='new') save(); rerender(); };
    } else if(action==='every'){
      el.value=r.every||1;
      el.oninput=()=>{ const n=parseInt(el.value,10); if(!isNaN(n)&&n>0){ r.every=n; r.mode='everyN'; if(scope!=='new') save(); } };
    } else if(action==='dom'){
      el.value=(r.dom==='last')?'':(r.dom||1);
      el.oninput=()=>{ const n=parseInt(el.value,10); if(!isNaN(n)&&n>=1&&n<=31){ r.dom=n; r.mode='monthDay'; if(scope!=='new') save(); } };
    } else if(action==='domlast'){
      el.onclick=()=>{ r.dom=(r.dom==='last')?1:'last'; r.mode='monthDay'; if(scope!=='new') save(); rerender(); };
    }
  });

  // new-task draft text + kind
  q('[data-newkind]','all').forEach(el=>el.onclick=()=>{ newRec.kind=el.dataset.newkind; rerender(); });
  const nn=q('#newRecurring'); if(nn) nn.oninput=()=>{ newRec.t=nn.value; };
  const add=q('#addRecurring'); if(add) add.onclick=()=>{
    const v=(newRec.t||'').trim(); if(!v)return;
    if(newRec.mode==='weekdays' && !(newRec.dows||[]).length){ toast('Pick at least one day'); return; }
    const r={id:b(),t:v,kind:newRec.kind,mode:newRec.mode,auto:true,last:null};
    if(newRec.mode==='everyN') r.every=newRec.every||1;
    else if(newRec.mode==='weekdays') r.dows=(newRec.dows||[]).slice();
    else r.dom=newRec.dom||1;
    S.recurring.push(r);
    newRec={t:'',kind:'quick',mode:'everyN',every:1,dows:[],dom:1};
    save(); rerender();
  };
  const ni=q('#newRecurring'); if(ni) ni.onkeydown=e=>{ if(e.key==='Enter') q('#addRecurring').click(); };
}
function toggleDow(r,i){ if(!r.dows) r.dows=[]; const x=r.dows.indexOf(i); if(x>-1) r.dows.splice(x,1); else r.dows.push(i); }
function ensureSchedDefaults(r){
  if(r.mode==='everyN' && r.every==null) r.every=1;
  if(r.mode==='weekdays' && !Array.isArray(r.dows)) r.dows=[];
  if(r.mode==='monthDay' && r.dom==null) r.dom=1;
}

  const sched=scheduledOn(dk);          // tasks scheduled for THIS date (from any day record)
  const pool=poolUnscheduled();          // all unscheduled time-block tasks
  const now=new Date(); const nowH=now.getHours()+now.getMinutes()/60;
  const dt=dateFromKey(dk);
  const dateLabel=isToday?'Today':dt.toLocaleDateString('en-CA',{weekday:'long',month:'long',day:'numeric'});
  const ROW=56;   // px per hour row

  // background hour rows (clickable slots)
  let rows='';
  for(let h=ws; h<=we; h++){
    const isNow=(isToday && h===Math.floor(nowH));
    rows+=`
      <div class="hourrow ${isNow?'now':''}">
        <div class="hourlabel">${fmtHour(h)}</div>

        </div>
      </div>`;
  }
  // scheduled blocks, absolutely positioned over the column, sized by duration
  let blocks='';
  sched.forEach(e=>{
    const t=e.t;
    const top=(t.start-ws)*ROW;
    const height=Math.max(24,(t.mins/60)*ROW - 4);
    blocks+=planBlock(t, top, height);
  });
  const gridHeight=(we-ws+1)*ROW;
  // "now" line
  let nowLine='';
  if(isToday && nowH>=ws && nowH<=we+1){
    nowLine=`<div class="now-line" style="top:${(nowH-ws)*ROW}px"></div>`;
  }

  return `
  <div class="date-nav">
    <button class="date-arrow" id="planPrev">◀</button>
    <div class="date-cur ${isToday?'today':''}">${dateLabel}</div>
    <button class="date-arrow" id="planNext">▶</button>
    ${!isToday?`<button class="btn ghost sm" id="planToday">Today</button>`:''}
    <button class="btn ghost sm" id="interruptBtn" style="margin-left:auto">⏱ Push</button>
    <button class="btn ghost sm" id="clearSched">↺ Clear</button>
  </div>

  <div class="plan-wrap">
    <div class="grid-col">
      <div class="card flush plan-grid" style="position:relative">
        <div class="hourrows">${rows}</div>
        <div class="block-layer" style="height:${gridHeight}px">${blocks}${nowLine}</div>
      </div>
    </div>

    <div class="unsched-col">
      <div class="card">
        <div class="card-h"><h3>Needs scheduling</h3><span class="sub">${pool.length}</span></div>
        ${planSelected?`<div class="place-banner">Tap an hour to place on ${isToday?'today':shortDate(dk)} ↞ <span id="cancelPlace">cancel</span></div>`:''}
        <div class="unsched-list">
          ${pool.length?pool.map(e=>`
            <div class="unsched-item ${planSelected===e.t.id?'picked':''}" draggable="true" data-drag="${e.t.id}" data-pick="${e.t.id}">
              <span class="dot">▣</span>
              <span class="utxt">${esc(e.t.txt)}</span>
              <span class="umins">${fmtDuration(e.t.mins)}</span>
            </div>`).join(''):'<div class="empty">Nothing to schedule ✓</div>'}
        </div>
        <div class="task-add" style="margin-top:14px">
          <input type="text" id="planQuickAdd" placeholder="Add a task...">
          <button class="btn sm" id="planQuickAddBtn">+</button>
        </div>
      </div>
    </div>
  </div>
  `;
}

/* ---- WEEK / MONTH read-only overviews ---- */
function dayKeyOffset(n){
  const d=new Date(); d.setDate(d.getDate()+n);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
/* what's scheduled on a given date: time-block tasks with schedDate===k. No recurring. */
function agendaFor(k){
  return allTimeBlockTasks()
    .filter(e=>e.t.schedDate===k)
    .sort((a,b)=>(a.t.start||0)-(b.t.start||0))
    .map(e=>({txt:e.t.txt, time:e.t.start!=null?fmtHour(e.t.start):'', done:e.t.done}));
}
function renderWeekView(){
  const todayK=todayKey();

function renderMonthView(){

function hourOptions(sel,from,to){

/* does placing task `id` (mins long) at `slot` overlap an existing block on date dk? */
function slotConflict(dk,id,slot,mins){
  const span=mins/60;
  return scheduledOn(dk).some(e=>{
    if(e.t.id===id) return false;
    const s=e.t.start, en=s+(e.t.mins/60);
    const ns=slot, nen=slot+span;
    return ns<en && nen>s;   // intervals overlap
  });
}
function placeProject(id,hour){
  const e=findTaskGlobal(id); if(!e) return;
  const t=e.t; const dk=curPlanDate();
  const we=(S.settings&&S.settings.dayEnd)||21;
  const span=t.mins/60;
  // find first non-conflicting slot at/after requested hour, half-hour granularity
  let slot=hour;
  while(slot+span<=we+1 && slotConflict(dk,id,slot,t.mins)) slot+=0.5;
  t.schedDate=dk; t.start=slot;
  save(); planSelected=null; rerender();
}

function bindPlan(){
  // view tabs (always present)
  q('[data-planview]','all').forEach(el=>el.onclick=()=>{ planView=el.dataset.planview; rerender(); });
  if(planView!=='day') return;   // week/month are read-only

  // drag & drop
  q('[data-drag]','all').forEach(el=>{
    el.ondragstart=e=>{ e.dataTransfer.setData('text/plain',el.dataset.drag); el.classList.add('dragging'); };
    el.ondragend=()=>el.classList.remove('dragging');
  });
  q('[data-slot]','all').forEach(slot=>{
    slot.ondragover=e=>{ e.preventDefault(); slot.classList.add('over'); };
    slot.ondragleave=()=>slot.classList.remove('over');
    slot.ondrop=e=>{ e.preventDefault(); slot.classList.remove('over');
      const id=e.dataTransfer.getData('text/plain'); if(id) placeProject(id,+slot.dataset.slot);
    };
    // click-to-place (mobile / reliable fallback)
    slot.onclick=()=>{ if(planSelected) placeProject(planSelected,+slot.dataset.slot); };
  });
  // pick a project (tap)
  q('[data-pick]','all').forEach(el=>el.onclick=(e)=>{
    e.stopPropagation();
    planSelected = planSelected===el.dataset.pick ? null : el.dataset.pick;
    rerender();
  });
  const cp=q('#cancelPlace'); if(cp) cp.onclick=()=>{ planSelected=null; rerender(); };

  // date navigation
  const pp=q('#planPrev'); if(pp) pp.onclick=()=>{ planDateShift(-1); planSelected=null; rerender(); };
  const pn=q('#planNext'); if(pn) pn.onclick=()=>{ planDateShift(1); planSelected=null; rerender(); };
  const pt=q('#planToday'); if(pt) pt.onclick=()=>{ planDate=null; planSelected=null; rerender(); };

  // block actions — clear schedDate to send back to the pool
  q('[data-bump]','all').forEach(el=>el.onclick=(e)=>{
    e.stopPropagation();
    const found=findTaskGlobal(el.dataset.bump); if(found){ found.t.start=null; found.t.schedDate=null; save(); rerender(); }
  });
  // adjust duration on a scheduled block
  q('[data-blockdur]','all').forEach(el=>el.onclick=(e)=>{
    e.stopPropagation();
    openDurationPicker(el.dataset.blockdur);
  });
  q('[data-pdone]','all').forEach(el=>el.onclick=(e)=>{
    e.stopPropagation();
    const found=findTaskGlobal(el.dataset.pdone);
    if(found){
      const t=found.t; t.done=true;
      if(t.projectId && t.projTaskId){ const p=S.projects.find(x=>x.id===t.projectId); const pt2=p&&p.tasks.find(x=>x.id===t.projTaskId); if(pt2) pt2.done=true; }
      save(false); toast('Done ✓'); rerender();
    }
  });

  // toolbar
  const ib=q('#interruptBtn'); if(ib) ib.onclick=openInterrupt;
  const cs=q('#clearSched'); if(cs) cs.onclick=()=>{
    const dk=curPlanDate();
    scheduledOn(dk).forEach(e=>{ e.t.start=null; e.t.schedDate=null; });
    save(); toast('Cleared'); rerender();
  };

  // add task from plan (lands in today's list, unscheduled, in the pool)
  const qa=q('#planQuickAddBtn'); const doAdd=()=>{
    const i=q('#planQuickAdd'); const v=i.value.trim(); if(!v)return; addTask(v,'project'); rerender();
  };
  if(qa) qa.onclick=doAdd;
  const qi=q('#planQuickAdd'); if(qi) qi.onkeydown=e=>{ if(e.key==='Enter') doAdd(); };
}

/* ---- data aggregation ---- */
function insightDays(n){
  // returns last n days that have any data, oldest→newest, as {key,d}
  const keys=Object.keys(S.days).sort();
  return keys.slice(-n).map(k=>({key:k,d:S.days[k]}));
}
function dayDoneCount(d){ return (d.archive?.length||0)+(d.tasks?.filter(t=>t.done).length||0); }
function dayAvgEnergy(d){
  const ci=d.checkins||[]; if(!ci.length){ return energyToNum(d.energy); }
  const vals=ci.map(c=>energyToNum(c.energy)).filter(v=>v); if(!vals.length) return energyToNum(d.energy);
  return vals.reduce((a,b)=>a+b,0)/vals.length;
}
function parseSleepHours(str){
  if(!str) return null; const m=String(str).match(/(\d+(\.\d+)?)/); return m?parseFloat(m[1]):null;
}
function mean(arr){ const v=arr.filter(x=>x!=null&&!isNaN(x)); return v.length?v.reduce((a,b)=>a+b,0)/v.length:null; }

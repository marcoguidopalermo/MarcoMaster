/* ---- plain-language engine ---- */
function plainLanguageRead(x){
  const lines=[];
  const cmp=(t,a,unit,label)=>{
    if(t==null||a==null) return null;
    const diff=t-a; const pct=a?Math.round(Math.abs(diff)/a*100):0;
    if(Math.abs(diff)<0.01) return `Your ${label} today is right on your ${all0(a,unit)} average.`;
    return `Your ${label} today (${num(t)}${unit}) is ${diff>0?'above':'below'} your average of ${num(a)}${unit}${pct?` (${pct}% ${diff>0?'higher':'lower'})`:''}.`;
  };
  let l;
  if((l=cmp(x.todayDone,x.avgDone,'','task completion'))) lines.push(l);
  if((l=cmp(x.todayEnergy,x.avgEnergy,'/3','energy'))) lines.push(l);

  // sleep ↔ energy correlation (rough)
  const pairs=[]; for(let i=1;i<x.energySeries.length;i++){
    const s=x.sleepSeries[i-1]?.v, e=x.energySeries[i]?.v;
    if(s!=null&&e!=null) pairs.push([s,e]);
  }
  if(pairs.length>=4){
    const hi=pairs.filter(p=>p[0]>=mean(pairs.map(p=>p[0])));
    const lo=pairs.filter(p=>p[0]<mean(pairs.map(p=>p[0])));
    const ehi=mean(hi.map(p=>p[1])), elo=mean(lo.map(p=>p[1]));
    if(ehi!=null&&elo!=null&&Math.abs(ehi-elo)>0.25){
      lines.push(`Pattern: on better-sleep nights your next-day energy averages ${ehi.toFixed(1)}/3 vs ${elo.toFixed(1)}/3 after lighter sleep. Sleep is moving your energy.`);
    }
  }

  // best/worst recent day
  const done=x.doneSeries.filter(d=>d.v>0);
  if(done.length>=3){
    const best=done.reduce((a,b)=>b.v>a.v?b:a);
    lines.push(`Most productive recent day: ${prettyKey(best.k)} (${best.v} done).`);
  }

  // scorecard weakest
  if(Object.keys(x.latestWk).length){
    const entries=Object.entries(x.latestWk);
    const weak=entries.reduce((a,b)=>b[1]<a[1]?b:a);
    lines.push(`Weakest scorecard area right now: ${weak[0]} (${weak[1]}/10) — your prime corrective target.`);
  }

  // drift recurrence
  if(x.drifts.length>=2){
    const words={};
    x.drifts.join(' ').toLowerCase().replace(/[^a-z\s]/g,'').split(/\s+/).forEach(w=>{ if(w.length>4) words[w]=(words[w]||0)+1; });
    const rep=Object.entries(words).filter(([w,c])=>c>=2).sort((a,b)=>b[1]-a[1]).slice(0,3);
    if(rep.length) lines.push(`Recurring drift word${rep.length>1?'s':''}: ${rep.map(r=>`"${r[0]}" (×${r[1]})`).join(', ')}. Build a system around this, not more discipline.`);
  }

  if(!lines.length) lines.push('Keep logging — once you have a few days of energy, sleep and completions, real patterns surface here.');
  return lines.map(t=>`<div class="read-line">→ ${t}</div>`).join('');
}
function num(v){ return v==null?'—':(Math.round(v*10)/10); }
function all0(v,u){ return num(v)+u; }
function prettyKey(k){ const [y,m,dd]=k.split('-'); return new Date(y,m-1,dd).toLocaleDateString('en-CA',{month:'short',day:'numeric'}); }

/* ---- metric card: today vs average ---- */
function metricCard(label,today,avg,unit,inv){
  const has=today!=null;
  let cls='', arrow='', diffTxt='vs avg —';
  if(has&&avg!=null){
    const diff=today-avg;
    if(Math.abs(diff)<0.05){ cls='mid'; arrow='='; diffTxt='on average'; }
    else { const up=diff>0; cls=(up!==inv)?'high':'low'; arrow=up?'▲':'▼'; diffTxt=`${up?'+':''}${num(diff)}${unit} vs avg ${num(avg)}${unit}`; }
  }
  return `<div class="card metric-card">
    <div class="mc-lab">${label}</div>
    <div class="mc-val">${has?num(today)+unit:'—'}</div>
    <div class="mc-diff ${cls}">${arrow} ${diffTxt}</div>
  </div>`;
}

/* ---- SVG line chart ---- */
function lineChart(series,min,max,color){
  const pts=series.filter(p=>p.v!=null);
  if(pts.length<2) return '<div class="empty">Need at least 2 days of data.</div>';
  const W=560,H=130,pad=20;
  const n=series.length;
  const x=i=>pad+(i/(n-1))*(W-pad*2);
  const y=v=>H-pad-((v-min)/(max-min))*(H-pad*2);
  let d='',dots='';
  let started=false;
  series.forEach((p,i)=>{
    if(p.v==null) return;
    const px=x(i),py=y(p.v);
    d+=(started?'L':'M')+px.toFixed(1)+' '+py.toFixed(1)+' '; started=true;
    dots+=`<circle cx="${px.toFixed(1)}" cy="${py.toFixed(1)}" r="3.5" fill="${color}"/>`;
  });
  // axis ticks
  const mid=(min+max)/2;
  return `<svg viewBox="0 0 ${W} ${H}" class="chart" preserveAspectRatio="xMidYMid meet">
    <line x1="${pad}" y1="${y(max)}" x2="${W-pad}" y2="${y(max)}" stroke="var(--line-soft)"/>
    <line x1="${pad}" y1="${y(mid)}" x2="${W-pad}" y2="${y(mid)}" stroke="var(--line-soft)" stroke-dasharray="2 4"/>
    <line x1="${pad}" y1="${y(min)}" x2="${W-pad}" y2="${y(min)}" stroke="var(--line-soft)"/>
    <text x="2" y="${y(max)+4}" class="ctick">${max}</text>
    <text x="2" y="${y(min)+4}" class="ctick">${min}</text>
    <path d="${d}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round"/>
    ${dots}
  </svg>
  <div class="chart-x">${chartXLabels(series)}</div>`;
}

/* ---- SVG bar chart ---- */
function barChart(series,color){
  const pts=series.filter(p=>p.v!=null);
  if(!pts.length) return '<div class="empty">No data yet.</div>';
  const W=560,H=130,pad=20;
  const n=series.length;
  const max=Math.max(1,...series.map(p=>p.v||0));
  const bw=(W-pad*2)/n*0.62;
  const step=(W-pad*2)/n;
  let bars='';
  series.forEach((p,i)=>{
    const v=p.v||0;
    const h=((v)/(max))*(H-pad*2);
    const bx=pad+i*step+(step-bw)/2;
    const by=H-pad-h;
    bars+=`<rect x="${bx.toFixed(1)}" y="${by.toFixed(1)}" width="${bw.toFixed(1)}" height="${Math.max(0,h).toFixed(1)}" rx="2" fill="${color}" opacity="${v?1:0.15}"/>`;
    if(v) bars+=`<text x="${(bx+bw/2).toFixed(1)}" y="${(by-4).toFixed(1)}" class="cval">${v}</text>`;
  });
  return `<svg viewBox="0 0 ${W} ${H}" class="chart" preserveAspectRatio="xMidYMid meet">
    <line x1="${pad}" y1="${H-pad}" x2="${W-pad}" y2="${H-pad}" stroke="var(--line-soft)"/>${bars}
  </svg><div class="chart-x">${chartXLabels(series)}</div>`;
}
function chartXLabels(series){
  const n=series.length; const showEvery=Math.ceil(n/7);
  return series.map((p,i)=>`<span style="flex:1;text-align:center">${i%showEvery===0?prettyKey(p.k).replace(/^[A-Za-z]+ /,'')||p.k.slice(-2):''}</span>`).join('');
}

/* ---- area bars (scorecard breakdown) ---- */
function areaBars(scores){
  return SCORE_AREAS.map(a=>{
    const v=scores[a]; if(v==null) return '';
    const cls=v<=4?'low':v<=7?'mid':'high';
    return `<div class="abar"><span class="abar-lab">${a}</span><div class="abar-track"><div class="abar-fill ${cls}" style="width:${v*10}%"></div></div><span class="abar-v">${v}</span></div>`;
  }).join('');
}

/* ---- mood cloud ---- */
function moodCloud(all){
  const counts={};
  all.forEach(x=>{
    (x.d.checkins||[]).forEach(c=>{ if(c.mood) c.mood.toLowerCase().split(/[\s,]+/).forEach(w=>{ if(w) counts[w]=(counts[w]||0)+1; }); });
    if(x.d.mood) x.d.mood.toLowerCase().split(/[\s,]+/).forEach(w=>{ if(w) counts[w]=(counts[w]||0)+1; });
  });
  const entries=Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,24);
  if(!entries.length) return '<div class="empty">Log mood words in your Energy & Mood Log and they collect here.</div>';
  const max=entries[0][1];
  return `<div class="mood-cloud">${entries.map(([w,c])=>{
    const size=13+(c/max)*16;
    const op=0.55+(c/max)*0.45;
    return `<span class="mood-word" style="font-size:${size.toFixed(0)}px;opacity:${op.toFixed(2)}">${esc(w)}${c>1?`<sub>${c}</sub>`:''}</span>`;
  }).join('')}</div>`;
}

/* ---- day log table ---- */
function dayLogTable(all){
  const rows=[...all].reverse().slice(0,14);
  return `<div class="daylog">
    ${rows.map(x=>{

      </div>`;
    }).join('')}
  </div>`;
}

  parking:{render:renderParking,bind:bindParking},
  rules:{render:renderRules,bind:bindRules},
  shutdown:{render:renderShutdown,bind:bindShutdown},
  settings:{render:renderSettings,bind:bindSettings},
};
let current='today';

function rerender(){
  const main=q('#main');
  // remember scroll + focused field so live typing doesn't jump
  const active=document.activeElement;
  const tag=active?.dataset?(active.dataset.focus||active.dataset.state||active.dataset.rev||active.dataset.sd||active.dataset.rule):null;
  const selStart=active?.selectionStart;
  const scroll=window.scrollY;

  main.innerHTML=PAGES[current].render();
  injectTomorrowFlag();
  PAGES[current].bind();
  updateNavBadge();

  // restore focus
  if(tag!=null){
    const re=q(`[data-focus="${tag}"],[data-state="${tag}"],[data-rev="${tag}"],[data-sd="${tag}"],[data-rule="${tag}"]`);
    if(re){ re.focus(); try{ re.setSelectionRange(selStart,selStart); }catch(e){} }
  }
  window.scrollTo(0,scroll);
}

/* nav definition: daily essentials always shown; rest behind "More" */
const NAV_DAILY=[
  ['today','◎','Today'],
  ['plan','▦','Time Blocker'],
  ['shutdown','☾','Night'],
];
const NAV_MORE=[
  ['projects','◳','Projects'],
  ['recurring','↻','Recurring Tasks'],
  ['insights','◈','MarcoInsights'],
  ['review','▤','Weekly CEO Review'],
  ['scorecard','◧','Life Scorecard'],
  ['board','⊞','Priority Board'],
  ['parking','⊟','Parking Lot'],
  ['rules','§','Rules / Future Self'],
];
function renderNav(){
  const showMore=S.settings&&S.settings.showMore;
  const link=([page,ic,label])=>`<button class="navbtn ${current===page?'active':''}" data-page="${page}"><span class="ic">${ic}</span>${label}${page==='today'?'<span class="badge" id="navTodayBadge" style="display:none">0</span>':''}</button>`;
  let html=NAV_DAILY.map(link).join('');
  html+=`<button class="navbtn nav-more-toggle ${showMore?'open':''}" id="navMoreToggle"><span class="ic">${showMore?'▾':'▸'}</span>More</button>`;
  if(showMore){
    html+=`<div class="nav-more">${NAV_MORE.map(link).join('')}</div>`;
  }
  html+=link(['settings','⚙','Settings']);
  const c=q('#navLinks'); c.innerHTML=html;
  q('#navLinks .navbtn','all').forEach(btn=>{ if(btn.dataset.page) btn.onclick=()=>go(btn.dataset.page); });
  const mt=q('#navMoreToggle'); if(mt) mt.onclick=()=>{ S.settings.showMore=!showMore; save(false); renderNav(); };
  updateNavBadge();
}

function go(page){
  current=page;
  renderNav();
  const main=q('#main');
  main.innerHTML=PAGES[page].render();
  injectTomorrowFlag();
  PAGES[page].bind();
  updateNavBadge();
  window.scrollTo(0,0);
}

/* surface "tomorrow's first move" at top of Today */
function injectTomorrowFlag(){
  if(current!=='today') return;
  // pull yesterday's shutdown firstMove
  const keys=Object.keys(S.days).sort();
  const ti=keys.indexOf(todayKey());
  let prev=null;
  for(let i=keys.length-1;i>=0;i--){ if(keys[i]<todayKey()){ prev=S.days[keys[i]]; break; } }
  const move=prev?.shutdown?.firstMove;
  if(move && move.trim()){
    const head=q('.focus-hero');
    if(head){
      const flag=document.createElement('div');
      flag.className='tomorrow-flag';
      flag.innerHTML=`<span class="lab">↳ Last night you said tomorrow's first move is</span>${esc(move)}`;
      head.parentNode.insertBefore(flag,head);
    }
  }
}

function updateNavBadge(){
  const d=day();
  const remaining=RESET_STEPS.filter(s=>!d.reset[s[0]]).length;
  const badge=q('#navTodayBadge');
  if(remaining>0 && remaining<RESET_STEPS.length){ badge.style.display=''; badge.textContent=remaining; }
  else if(remaining===RESET_STEPS.length){ badge.style.display=''; badge.textContent=RESET_STEPS.length; }
  else badge.style.display='none';
}

/* ============================================================
   RESET BUTTON  — no shame, just "next right action"
   ============================================================ */
function openReset(){
  const m=q('#resetModal');
  const d=day();
  m.innerHTML=`
    <div class="modal">
      <span class="modal-close" id="resetClose">×</span>
      <h3>Reset</h3>
      <p class="intro">You fell off for a bit. That's fine — the system doesn't keep score against you. Just answer five things and you're back in.</p>
      <div class="qf"><label>What is the next right action?</label>
        <input type="text" id="rs_next" placeholder="The single smallest move that gets you going"></div>
      <div class="qf"><label>What is today's workout?</label>
        <input type="text" id="rs_workout" placeholder="Even 20 minutes counts"></div>
      <div class="qf"><label>What is today's #1 business win?</label>
        <input type="text" id="rs_biz" placeholder="One outcome"></div>
      <div class="qf"><label>What can be parked?</label>
        <input type="text" id="rs_park" placeholder="Anything you can let go of right now"></div>
      <div class="qf"><label>What needs to be simplified?</label>
        <input type="text" id="rs_simplify" placeholder="What got too complicated?"></div>
      <div class="btn-row" style="margin-top:20px">
        <button class="btn" id="rs_apply">Apply & go to Today</button>
        <button class="btn ghost" id="rs_cancel">Cancel</button>
      </div>
    </div>`;
  m.classList.add('show');
  q('#resetClose').onclick=closeReset;
  q('#rs_cancel').onclick=closeReset;
  q('#rs_apply').onclick=()=>{
    const next=q('#rs_next').value.trim();
    const workout=q('#rs_workout').value.trim();
    const biz=q('#rs_biz').value.trim();
    const park=q('#rs_park').value.trim();
    const d=day();
    if(workout) d.workout=workout;
    if(biz) d.focus.biz=biz;
    if(next) d.focus.lev = next; // next right action -> seed leverage line
    if(next) d.focus.not = d.focus.not || 'Everything except the next right action';
    if(park){ S.board.parking.push({id:b(),txt:park}); }
    save();
    closeReset();
    go('today');
    toast('Back in. One step at a time.');
  };
}
function closeReset(){ q('#resetModal').classList.remove('show'); }

function showSignIn(msg){
  const app=document.querySelector('.app');
  if(app) app.style.display='none';
  let g=document.getElementById('signinGate');
  if(!g){
    g=document.createElement('div'); g.id='signinGate'; g.className='signin-gate';
    document.body.appendChild(g);
  }
  g.style.display='flex';
  g.innerHTML=`
    <div class="signin-card">
      <h1><span class="dot"></span>MarcoMaster</h1>
      <p class="signin-tag">TaskMaster runs the business.<br>MarcoMaster runs Marco.</p>
      <button class="btn signin-btn" id="googleSignin">Sign in with Google</button>
      ${msg?`<p class="signin-msg">${msg}</p>`:''}
    </div>`;
  document.getElementById('googleSignin').onclick=async()=>{
    try{
      const provider=new firebase.auth.GoogleAuthProvider();
      await FB.auth.signInWithPopup(provider);
    }catch(e){
      showSignIn('Sign-in failed: '+(e.code||e.message||'try again'));
    }
  };
}

async function startApp(){
  const g=document.getElementById('signinGate'); if(g) g.style.display='none';
  const app=document.querySelector('.app'); if(app) app.style.display='';
  await loadState();
  applyTheme();
  syncRecurringIntoToday();
  await persist();
  q('#resetBtn').onclick=openReset;
  const tb=q('#themeBtn'); if(tb) tb.onclick=toggleTheme;
  q('#resetModal').onclick=(e)=>{ if(e.target.id==='resetModal') closeReset(); };
  document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeReset(); });
  go('today');
}

async function init(){
  // If Firebase SDK is present, use cloud auth + sync. Otherwise run local-only.
  if(typeof firebase!=='undefined' && firebase.initializeApp){
    try{
      FB.app=firebase.initializeApp(FIREBASE_CONFIG);
      FB.auth=firebase.auth();
      FB.db=firebase.firestore();
      FB.ready=true;
      try{ await FB.auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL); }catch(e){}
      FB.auth.onAuthStateChanged(async(user)=>{
        if(user){ FB.user=user; await startApp(); }
        else { FB.user=null; showSignIn(); }
      });
      return;
    }catch(e){
      console.warn('Firebase init failed, running local-only',e);
    }
  }
  // local-only fallback (e.g. opened as a plain file)
  await startApp();
}
init();

/* sign out (exposed for a settings button) */
async function signOut(){
  if(FB.auth){ try{ await FB.auth.signOut(); }catch(e){} location.reload(); }
}
